<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Petroflow • Invest in Oil & Gas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
    <style>
        /* ---------- THEME VARIABLES ---------- */
        :root {
            --bg-primary: #0b0b1a;
            --bg-secondary: #111128;
            --bg-card: #16163a;
            --bg-card-hover: #1e1e4a;
            --gold: #d4a843;
            --gold-light: #f5d37c;
            --gold-glow: rgba(212, 168, 67, 0.25);
            --text-primary: #f0f0f5;
            --text-secondary: #a0a0c0;
            --text-muted: #6a6a8a;
            --border-color: #2a2a5a;
            --shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --toast-bg: var(--bg-card);
        }

        /* Light theme (system preference or manual toggle) */
        [data-theme="light"] {
            --bg-primary: #f5f5fa;
            --bg-secondary: #e8e8f0;
            --bg-card: #ffffff;
            --bg-card-hover: #f0f0f8;
            --text-primary: #1a1a2e;
            --text-secondary: #3a3a5a;
            --text-muted: #7a7a9a;
            --border-color: #c0c0d0;
            --shadow: 0 8px 40px rgba(0, 0, 0, 0.08);
            --toast-bg: #ffffff;
        }

        /* Auto-detect system preference */
        @media (prefers-color-scheme: light) {
            :root:not([data-theme="dark"]) {
                --bg-primary: #f5f5fa;
                --bg-secondary: #e8e8f0;
                --bg-card: #ffffff;
                --bg-card-hover: #f0f0f8;
                --text-primary: #1a1a2e;
                --text-secondary: #3a3a5a;
                --text-muted: #7a7a9a;
                --border-color: #c0c0d0;
                --shadow: 0 8px 40px rgba(0, 0, 0, 0.08);
                --toast-bg: #ffffff;
            }
        }

        /* ---------- RESET & BASE ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
        }
        a {
            color: var(--gold);
            text-decoration: none;
        }
        button {
            font-family: var(--font);
            cursor: pointer;
            border: none;
            outline: none;
            transition: var(--transition);
        }
        input,
        select,
        textarea {
            font-family: var(--font);
            outline: none;
            border: none;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        /* ---------- UTILITY ---------- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .flex {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .flex-between {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
        }
        .text-gold {
            color: var(--gold);
        }
        .text-muted {
            color: var(--text-muted);
        }
        .text-center {
            text-align: center;
        }
        .mt-1 {
            margin-top: 10px;
        }
        .mt-2 {
            margin-top: 20px;
        }
        .mt-3 {
            margin-top: 30px;
        }
        .mt-4 {
            margin-top: 40px;
        }
        .mb-2 {
            margin-bottom: 20px;
        }
        .mb-3 {
            margin-bottom: 30px;
        }
        .hidden {
            display: none !important;
        }
        .fade-in {
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ---------- BUTTONS ---------- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 14px;
            transition: var(--transition);
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .btn-gold {
            background: var(--gold);
            color: #0b0b1a;
            border: 1px solid var(--gold);
        }
        .btn-gold:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--gold-glow);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
        }
        .btn-outline:hover {
            background: var(--gold);
            color: #0b0b1a;
        }
        .btn-danger {
            background: #e74c3c;
            color: #fff;
            border: 1px solid #e74c3c;
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .btn-success {
            background: #27ae60;
            color: #fff;
            border: 1px solid #27ae60;
        }
        .btn-success:hover {
            background: #1e8449;
        }
        .btn-sm {
            padding: 8px 16px;
            font-size: 12px;
        }
        .btn-block {
            width: 100%;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-back {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 6px 14px;
            font-size: 13px;
        }
        .btn-back:hover {
            border-color: var(--gold);
            color: var(--gold);
            transform: translateX(-2px);
        }

        /* ---------- CARDS ---------- */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            backdrop-filter: blur(4px);
        }
        .card:hover {
            border-color: var(--gold);
            box-shadow: 0 8px 40px rgba(212, 168, 67, 0.05);
        }
        .card-gold {
            border-color: var(--gold);
            background: linear-gradient(145deg, var(--bg-card), var(--bg-secondary));
        }
        .card-gold .card-title {
            color: var(--gold);
        }

        /* ---------- HEADER / NAV ---------- */
        .header {
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-primary);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background 0.3s;
        }
        .header .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header .logo i {
            color: var(--gold);
            font-size: 28px;
        }
        .header .logo span {
            color: var(--gold);
        }
        .header .nav-links {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .header .nav-links a {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
        }
        .header .nav-links a:hover {
            color: var(--gold);
        }
        .header .nav-links .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-card);
            padding: 6px 14px 6px 10px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
        }
        .header .nav-links .user-badge .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--gold);
            color: #0b0b1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
        }
        .header .nav-links .user-badge span {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 13px;
        }
        .mobile-toggle {
            display: none;
            font-size: 24px;
            color: var(--text-primary);
            background: none;
        }
        .theme-toggle {
            background: none;
            color: var(--text-secondary);
            font-size: 18px;
            padding: 4px 8px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .theme-toggle:hover {
            color: var(--gold);
            border-color: var(--gold);
        }

        /* ---------- HERO ---------- */
        .hero {
            padding: 60px 0 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -40%;
            left: -20%;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
            opacity: 0.3;
            pointer-events: none;
        }
        .hero h1 {
            font-size: clamp(2.2rem, 6vw, 4.2rem);
            font-weight: 900;
            letter-spacing: -1px;
            line-height: 1.1;
            position: relative;
        }
        .hero h1 .highlight {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            font-size: 18px;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 16px auto 30px;
        }
        .hero .support {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-card);
            padding: 10px 20px;
            border-radius: 40px;
            border: 1px solid var(--border-color);
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 10px;
        }
        .hero .support i {
            color: #25d366;
            font-size: 20px;
        }
        .hero .support a {
            color: var(--text-primary);
            font-weight: 600;
        }

        /* ---------- FORMS ---------- */
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 14px;
            transition: var(--transition);
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-glow);
        }
        .form-group input::placeholder {
            color: var(--text-muted);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .form-group .file-input {
            position: relative;
            padding: 30px 20px;
            border: 2px dashed var(--border-color);
            border-radius: var(--radius-sm);
            text-align: center;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
        }
        .form-group .file-input:hover {
            border-color: var(--gold);
            background: rgba(212, 168, 67, 0.05);
        }
        .form-group .file-input input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }
        .form-group .file-input .file-name {
            color: var(--text-primary);
            font-weight: 500;
            margin-top: 6px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* ---------- DASHBOARD STATS ---------- */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px 24px;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }
        .stat-card:hover {
            border-color: var(--gold);
            transform: translateY(-3px);
        }
        .stat-card .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-card .stat-value {
            font-size: 28px;
            font-weight: 800;
            margin-top: 4px;
            letter-spacing: -0.5px;
        }
        .stat-card .stat-value.gold {
            color: var(--gold);
        }
        .stat-card .stat-icon {
            font-size: 28px;
            opacity: 0.2;
        }

        /* ---------- INVESTMENT PLANS ---------- */
        .plan-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 28px 24px;
            border: 1px solid var(--border-color);
            text-align: center;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .plan-card:hover {
            transform: translateY(-6px);
            border-color: var(--gold);
            box-shadow: 0 12px 50px rgba(212, 168, 67, 0.08);
        }
        .plan-card .plan-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--gold);
            color: #0b0b1a;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .plan-card .plan-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .plan-card .plan-rate {
            font-size: 36px;
            font-weight: 900;
            color: var(--gold);
            margin: 8px 0;
        }
        .plan-card .plan-rate small {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .plan-card .plan-fixed-amount {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 4px 0 8px;
        }
        .plan-card .plan-fixed-amount small {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-muted);
        }
        .plan-card .plan-desc {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 16px;
            min-height: 40px;
        }
        .plan-card .plan-features {
            list-style: none;
            text-align: left;
            margin: 12px 0 18px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .plan-card .plan-features li {
            padding: 4px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .plan-card .plan-features li i {
            color: var(--gold);
            font-size: 12px;
        }

        /* ---------- ADMIN PANEL ---------- */
        .admin-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 200;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            box-shadow: var(--shadow);
        }
        .admin-toggle:hover {
            border-color: var(--gold);
            color: var(--gold);
            transform: scale(1.05);
        }
        .admin-toggle .badge-dot {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 10px;
            height: 10px;
            background: #e74c3c;
            border-radius: 50%;
            border: 2px solid var(--bg-primary);
        }

        .admin-panel {
            position: fixed;
            top: 0;
            right: -440px;
            width: 420px;
            max-width: 90vw;
            height: 100vh;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            z-index: 300;
            padding: 24px;
            overflow-y: auto;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -8px 0 40px rgba(0, 0, 0, 0.6);
        }
        .admin-panel.open {
            right: 0;
        }
        .admin-panel .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .admin-panel .panel-header h3 {
            font-size: 20px;
        }
        .admin-panel .panel-header h3 i {
            color: var(--gold);
            margin-right: 8px;
        }
        .admin-panel .panel-close {
            background: none;
            color: var(--text-secondary);
            font-size: 24px;
        }
        .admin-panel .panel-close:hover {
            color: var(--text-primary);
        }
        .admin-panel .deposit-item {
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
        }
        .admin-panel .deposit-item .deposit-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .admin-panel .deposit-item .deposit-info .user {
            font-weight: 600;
        }
        .admin-panel .deposit-item .deposit-info .amount {
            color: var(--gold);
            font-weight: 700;
        }
        .admin-panel .deposit-item .deposit-info .status {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 12px;
            border-radius: 20px;
            text-transform: uppercase;
        }
        .admin-panel .deposit-item .deposit-info .status.pending {
            background: #f39c12;
            color: #0b0b1a;
        }
        .admin-panel .deposit-item .deposit-info .status.approved {
            background: #27ae60;
            color: #fff;
        }
        .admin-panel .deposit-item .deposit-info .status.rejected {
            background: #e74c3c;
            color: #fff;
        }
        .admin-panel .deposit-item .deposit-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .admin-panel .deposit-item .receipt-preview {
            max-width: 100%;
            max-height: 120px;
            border-radius: 6px;
            margin-top: 8px;
            border: 1px solid var(--border-color);
            object-fit: cover;
        }
        .admin-panel .deposit-item .bank-details-mini {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
            padding: 6px 10px;
            background: var(--bg-primary);
            border-radius: 6px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .admin-panel .deposit-item .bank-details-mini span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .admin-panel .deposit-item .bank-details-mini i {
            color: var(--gold);
            font-size: 11px;
        }
        .admin-panel .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 0;
        }
        .admin-panel .empty-state i {
            font-size: 48px;
            opacity: 0.3;
            margin-bottom: 12px;
        }
        .admin-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 250;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .admin-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        /* ---------- MODAL ---------- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            z-index: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }
        .modal {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 32px;
            max-width: 480px;
            width: 90%;
            border: 1px solid var(--border-color);
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }
        .modal-overlay.open .modal {
            transform: scale(1);
        }
        .modal .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal .modal-header h3 {
            font-size: 20px;
        }
        .modal .modal-close {
            background: none;
            color: var(--text-secondary);
            font-size: 22px;
        }
        .modal .modal-close:hover {
            color: var(--text-primary);
        }

        /* ---------- TOAST ---------- */
        .toast-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 360px;
            width: 100%;
        }
        .toast {
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            background: var(--toast-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 14px;
            box-shadow: var(--shadow);
            animation: slideInRight 0.4s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .toast.success {
            border-color: #27ae60;
        }
        .toast.success i {

                    if (referrer) {
                        const refEntry = referrer.referrals.find(r => r.userId === user.id);
                        if (refEntry && refEntry.status === 'pending') {
                            refEntry.status = 'active';
                            refEntry.depositedAt = new Date().toISOString();
                        }
                        referrer.balance = (referrer.balance || 0) + CONFIG.REFERRAL_BONUS_AMOUNT;
                        referrer.referralBonus = (referrer.referralBonus || 0) + CONFIG.REFERRAL_BONUS_AMOUNT;
                        showToast(`Referrer ${referrer.fullName} got ₦${CONFIG.REFERRAL_BONUS_AMOUNT} bonus!`, 'success');
                        const idx = state.users.findIndex(u => u.id === referrer.id);
                        if (idx !== -1) state.users[idx] = referrer;
                    }
                }
            }

            await saveAllData();
            return deposit;
        }

        async function rejectDeposit(depositId) {
            const deposit = state.deposits.find(d => d.id === depositId);
            if (!deposit) throw new Error('Deposit not found');
            if (deposit.status !== 'pending') throw new Error('Deposit already processed');
            deposit.status = 'rejected';
            await saveAllData();
            return deposit;
        }

        // ============================================================
        //  INVESTMENTS
        // ============================================================
        async function createInvestment(userId, planId) {
            const user = findUserById(userId);
            if (!user) throw new Error('User not found');
            const plan = PLANS.find(p => p.id === planId);
            if (!plan) throw new Error('Invalid plan');

            const amount = plan.amount;
            if (amount > user.balance) {
                throw new Error(`Insufficient balance. You need ${formatCurrency(amount)} but have ${formatCurrency(user.balance)}`);
            }

            user.balance = (user.balance || 0) - amount;
            user.totalInvested = (user.totalInvested || 0) + amount;

            const investment = {
                id: generateId(),
                userId,
                planId,
                amount: Number(amount),
                startDate: new Date().toISOString(),
                endDate: new Date(Date.now() + plan.duration * 24 * 60 * 60 * 1000).toISOString(),
                rate: plan.rate,
                status: 'active',
                returns: 0,
                createdAt: new Date().toISOString(),
            };

            state.investments.push(investment);
            await saveAllData();
            return investment;
        }

        // ============================================================
        //  WITHDRAWALS
        // ============================================================
        async function createWithdrawal(userId, amount, bankName, accountNumber, accountName) {
            const user = findUserById(userId);
            if (!user) throw new Error('User not found');

            const activeReferrals = user.referrals ? user.referrals.filter(r => r.status === 'active') : [];
            if (activeReferrals.length === 0) {
                throw new Error('You need at least one active referral (someone who has deposited) to withdraw. Share your referral code!');
            }

            if (amount > CONFIG.WITHDRAW_LIMIT) {
                throw new Error(`Maximum withdrawal is ${formatCurrency(CONFIG.WITHDRAW_LIMIT)}`);
            }
            if (amount < 100) throw new Error('Minimum withdrawal is ₦100');
            if (amount > user.balance) throw new Error('Insufficient balance');

            const withdrawal = {
                id: generateId(),
                userId,
                amount: Number(amount),
                bankName: bankName.trim(),
                accountNumber: accountNumber.trim(),
                accountName: accountName.trim(),
                status: 'pending',
                createdAt: new Date().toISOString(),
                processedAt: null,
            };
            state.withdrawals.push(withdrawal);

            user.balance = (user.balance || 0) - amount;

            await saveAllData();
            return withdrawal;
        }

        async function processWithdrawal(withdrawalId, action) {
            const withdrawal = state.withdrawals.find(w => w.id === withdrawalId);
            if (!withdrawal) throw new Error('Withdrawal not found');
            if (withdrawal.status !== 'pending') throw new Error('Withdrawal already processed');

            if (action === 'approve') {
                withdrawal.status = 'approved';
                withdrawal.processedAt = new Date().toISOString();
            } else if (action === 'reject') {
                withdrawal.status = 'rejected';
                withdrawal.processedAt = new Date().toISOString();
                const user = findUserById(withdrawal.userId);
                if (user) {
                    user.balance = (user.balance || 0) + withdrawal.amount;
                }
            }
            await saveAllData();
            return withdrawal;
        }

        // ============================================================

        // ============================================================
        async function setCustomReferralCode(userId, newCode) {
            const user = findUserById(userId);
            if (!user) throw new Error('User not found');
            if (user.customReferralCode) throw new Error('You already have a custom referral code. It cannot be changed.');
            const existing = state.users.find(u => u.customReferralCode && u.customReferralCode.toUpperCase() === newCode
                .toUpperCase());
            if (existing) throw new Error('This referral code is already taken. Please choose another.');
            if (newCode.length < 3) throw new Error('Referral code must be at least 3 characters.');
            if (!/^[a-zA-Z0-9]+$/.test(newCode)) throw new Error('Referral code can only contain letters and numbers.');
            user.customReferralCode = newCode.toUpperCase();
            await saveAllData();
            return user;
        }

            if (navigator.share) {

            } else {

                }).catch(() => {
                    const textarea = document.createElement('textarea');
                    textarea.value = message;
                    document.body.appendChild(textarea);

                    textarea.remove();
                    showToast('Referral link with message copied!', 'success');
                });
            }
        }

        // ============================================================
        //  INVESTMENT RETURNS
        // ============================================================
        function calculateReturns() {
            const now = Date.now();
            let updated = false;

            state.investments.forEach(inv => {
                if (inv.status !== 'active') return;
                const start = new Date(inv.startDate).getTime();
                const end = new Date(inv.endDate).getTime();
                if (now >= end) {
                    inv.status = 'completed';
                    const totalReturn = inv.amount * (inv.rate / 100);
                    inv.returns = totalReturn;
                    const user = findUserById(inv.userId);
                    if (user) {
                        user.balance = (user.balance || 0) + totalReturn;
                        user.totalReturns = (user.totalReturns || 0) + totalReturn;
                    }
                    updated = true;
                } else {
                    const elapsed = now - start;
                    const totalDuration = end - start;
                    const progress = elapsed / totalDuration;
                    const expectedReturn = inv.amount * (inv.rate / 100) * progress;
                    if (expectedReturn - inv.returns > 0.01) {
                        inv.returns = expectedReturn;
                        updated = true;
                    }
                }
            });

            if (updated) {
                saveAllData().catch(console.error);
            }
        }

                return 'light';
            }
            return 'dark';

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('petroflow_theme', theme);
            const icon = document.getElementById('themeIcon');
            if (theme === 'light') {
                icon.className = 'fas fa-sun';
            } else {
                icon.className = 'fas fa-moon';
            }
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'dark';
            const next = current === 'dark' ? 'light' : 'dark';
            setTheme(next);
        }

            document.getElementById('userBadge').style.display = isLoggedIn ? 'flex' : 'none';
            document.getElementById('logoutNavBtn').style.display = isLoggedIn ? 'inline-block' : 'none';
            document.getElementById('navDashboard').style.display = isLoggedIn ? 'inline-block' : 'none';
            document.getElementById('navPlans').style.display = 'inline-block';
            document.getElementById('navDeposit').style.display = isLoggedIn ? 'inline-block' : 'none';
            document.getElementById('navWithdraw').style.display = isLoggedIn ? 'inline-block' : 'none';
            document.getElementById('navInvest').style.display = isLoggedIn ? 'inline-block' : 'none';
            document.getElementById('navReferral').style.display = isLoggedIn ? 'inline-block' : 'none';

            if (isLoggedIn && state.currentUser) {
                document.getElementById('userAvatar').textContent = getInitials(state.currentUser.fullName);
                document.getElementById('userNameShort').textContent = state.currentUser.fullName.split(' ')[0];

        // ============================================================
        //  EVENT BINDING
        // ============================================================
        function bindEvents(view) {
            // Nav clicks
            document.querySelectorAll('[data-view]').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.preventDefault();
                    const viewName = el.dataset.view;
                    if (viewName === 'logout') {
                        handleLogout();
                        return;
                    }
                    if (viewName === 'dashboard' && !state.currentUser) {
                        showToast('Please login first', 'warning');
                        renderView('login');
                        return;
                    }
                    if ((viewName === 'deposit' || viewName === 'withdraw' || viewName === 'invest' || viewName ===
                            'referral') && !state.currentUser) {
                        showToast('Please login first', 'warning');
                        renderView('login');
                        return;
                    }
                    if (viewName === 'invest' && el.dataset.plan) {
                        const url = new URL(window.location);
                        url.searchParams.set('plan', el.dataset.plan);
                        window.history.pushState({}, '', url);
                        renderView('invest');
                        return;
                    }
                    renderView(viewName);
                    document.getElementById('navLinks').classList.remove('open');
                });
            });

            // Mobile toggle
            document.getElementById('mobileToggle').addEventListener('click', () => {
                document.getElementById('navLinks').classList.toggle('open');
            });

            // Logout via nav button
            document.getElementById('logoutNavBtn').addEventListener('click', (e) => {
                e.preventDefault();
                handleLogout();
            });

            // Logout via dashboard button
            document.getElementById('logoutDashBtn')?.addEventListener('click', (e) => {
                e.preventDefault();
                handleLogout();
            });

            // Theme
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);

            // Admin
            document.getElementById('adminToggle').addEventListener('click', toggleAdminPanel);
            document.getElementById('adminPanelClose').addEventListener('click', closeAdminPanel);
            document.getElementById('adminOverlay').addEventListener('click', closeAdminPanel);

            document.getElementById('adminAuthBtn')?.addEventListener('click', () => {
                const pw = document.getElementById('adminPasswordInput').value;
                if (pw === CONFIG.ADMIN_PASSWORD) {
                    state.adminAuthenticated = true;
                    renderAdminContent();
                    showToast('Admin access granted', 'success');
                } else {
                    showToast('Incorrect password', 'error');
                }
            });
            document.getElementById('adminPasswordInput')?.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') document.getElementById('adminAuthBtn').click();
            });

            // Copy account
            document.getElementById('copyAccountBtn')?.addEventListener('click', () => {
                navigator.clipboard.writeText(CONFIG.BANK_ACCOUNT).then(() => {
                    showToast('Account number copied!', 'success');
                }).catch(() => {
                    const ta = document.createElement('textarea');
                    ta.value = CONFIG.BANK_ACCOUNT;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    ta.remove();
                    showToast('Account number copied!', 'success');
                });
            });

            // Copy referral & share buttons (delegated)
            document.querySelectorAll('#copyReferralBtn, #copyReferralLinkBtn, #shareReferralBtn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = this.id;
                    if (id === 'shareReferralBtn') {
                        shareReferral();
                        return;
                    }
                    const code = state.currentUser?.customReferralCode || state.currentUser?.referralCode ||
                        '';
                    if (id === 'copyReferralLinkBtn') {
                        const link =
                            `${window.location.origin}${window.location.pathname}?ref=${code}`;
                        navigator.clipboard.writeText(link).then(() => {
                            showToast('Referral link copied!', 'success');
                        }).catch(() => {
                            const ta = document.createElement('textarea');
                            ta.value = link;
                            document.body.appendChild(ta);
                            ta.select();
                            document.execCommand('copy');
                            ta.remove();
                            showToast('Referral link copied!', 'success');
                        });
                    } else {
                        navigator.clipboard.writeText(code).then(() => {
                            showToast('Referral code copied!', 'success');
                        }).catch(() => {
                            const ta = document.createElement('textarea');
                            ta.value = code;
                            document.body.appendChild(ta);
                            ta.select();
                            document.execCommand('copy');
                            ta.remove();
                            showToast('Referral code copied!', 'success');
                        });
                    }
                });
            });

            // Set custom referral code
            document.getElementById('setReferralCodeForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const input = document.getElementById('newReferralCode');
                const code = input.value.trim().toUpperCase();
                const btn = e.target.querySelector('button[type="submit"]');
                btn.disabled = true;
                btn.innerHTML = '<span class="loader"></span>';
                try {
                    await setCustomReferralCode(state.currentUser.id, code);
                    const updatedUser = findUserById(state.currentUser.id);
                    state.currentUser = updatedUser;
                    saveSession(updatedUser);
                    showToast('Referral code set successfully!', 'success');
                    renderView('referral');
                } catch (err) {
                    showToast(err.message, 'error');
                }
                btn.disabled = false;
                btn.innerHTML = 'Set Code';
            });

            // Login
            document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value.trim();
                const password = document.getElementById('loginPassword').value;
                const btn = document.getElementById('loginBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="loader"></span> Signing in...';
                try {
                    const user = await loginUser(email, password);
                    state.currentUser = user;
                    saveSession(user);
                    showToast(`Welcome back, ${user.fullName}!`, 'success');
                    renderView('dashboard');
                } catch (err) {
                    showToast(err.message, 'error');
                }
                btn.disabled = false;
                btn.innerHTML = 'Sign In';
            });

            // Register
            document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('regName').value.trim();
                const email = document.getElementById('regEmail').value.trim();
                const phone = document.getElementById('regPhone').value.trim();
                const password = document.getElementById('regPassword').value;
                const referral = document.getElementById('regReferral').value.trim().toUpperCase();
                const btn = document.getElementById('registerBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="loader"></span> Creating account...';
                try {
                    const user = await registerUser(name, email, phone, password, referral);
                    state.currentUser = user;
                    saveSession(user);
                    showToast(`Account created! Welcome ${user.fullName}`, 'success');
                    renderView('dashboard');
                } catch (err) {
                    showToast(err.message, 'error');
                }
                btn.disabled = false;
                btn.innerHTML = 'Create Account';
            });

            // Deposit
            document.getElementById('depositForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const amountInput = document.getElementById('depositAmount');
                const amount = parseFloat(amountInput.value);
                const bankName = document.getElementById('depositBankName').value.trim();
                const accountNumber = document.getElementById('depositAccountNumber').value.trim();
                const accountName = document.getElementById('depositAccountName').value.trim();
                const file = document.getElementById('receiptFile').files[0];
                const btn = document.getElementById('depositBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="loader"></span> Submitting...';

                try {
                    if (!state.currentUser) throw new Error('Please login first');
                    if (!amount || isNaN(amount) || amount < 100) throw new Error('Minimum deposit is ₦100');
                    if (!bankName || !accountNumber || !accountName) throw new Error('Please fill all bank details');

                    let receiptBase64 = '';
                    if (file) {
                        receiptBase64 = await fileToBase64(file);
                    }

                    await createDeposit(state.currentUser.id, amount, bankName, accountNumber, accountName,
                    receiptBase64);
                    showToast(`Deposit of ${formatCurrency(amount)} submitted for verification!`, 'success');
                    renderView('dashboard');
                } catch (err) {
                    showToast(err.message || 'Deposit submission failed', 'error');
                }
                btn.disabled = false;
                btn.innerHTML = 'Submit Deposit';
            });

            // File input preview
            const fileInput = document.getElementById('receiptFile');
            const fileName = document.getElementById('receiptFileName');
            if (fileInput && fileName) {
                fileInput.addEventListener('change', () => {
                    fileName.textContent = fileInput.files.length > 0 ? fileInput.files[0].name : 'No file selected';
                });
            }

            // Withdraw
            document.getElementById('withdrawForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const amount = parseFloat(document.getElementById('withdrawAmount').value);
                const bankName = document.getElementById('withdrawBank').value.trim();
                const accountNumber = document.getElementById('withdrawAccount').value.trim();
                const accountName = document.getElementById('withdrawAccountName').value.trim();
                const btn = document.getElementById('withdrawBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="loader"></span> Submitting...';

                try {
                    if (!state.currentUser) throw new Error('Please login first');
                    if (!amount || isNaN(amount) || amount < 100) throw new Error('Minimum withdrawal is ₦100');
                    if (amount > CONFIG.WITHDRAW_LIMIT) throw new Error(
                        `Maximum withdrawal is ${formatCurrency(CONFIG.WITHDRAW_LIMIT)}`);
                    if (!bankName || !accountNumber || !accountName) throw new Error('Please fill all bank details');

                    await createWithdrawal(state.currentUser.id, amount, bankName, accountNumber, accountName);
                    showToast(`Withdrawal of ${formatCurrency(amount)} submitted!`, 'success');
                    renderView('dashboard');
                } catch (err) {
                    showToast(err.message, 'error');
                }
                btn.disabled = false;
                btn.innerHTML = 'Request Withdrawal';
            });

            // Invest
            const investForm = document.getElementById('investForm');
            if (investForm) {
                const planSelect = document.getElementById('investPlan');

                function updateInvestDisplay() {
                    const planId = planSelect.value;
                    const plan = PLANS.find(p => p.id === planId);
                    if (plan) {
                        document.getElementById('investDisplayAmount').textContent = formatCurrency(plan.amount);
                        document.getElementById('investDisplayRate').textContent = plan.rate + '%';
                        document.getElementById('investDisplayReturn').textContent = formatCurrency(plan.amount * plan
                            .rate / 100);
                        document.getElementById('investBtn').innerHTML =
                            `<i class="fas fa-rocket"></i> Invest ${formatCurrency(plan.amount)}`;
                    }
                }

                planSelect.addEventListener('change', updateInvestDisplay);
                setTimeout(updateInvestDisplay, 100);

                investForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const planId = document.getElementById('investPlan').value;
                    const btn = document.getElementById('investBtn');
                    btn.disabled = true;
                    btn.innerHTML = '<span class="loader"></span> Processing...';

                    try {
                        if (!state.currentUser) throw new Error('Please login first');
                        const plan = PLANS.find(p => p.id === planId);
                        if (!plan) throw new Error('Invalid plan');

                        await createInvestment(state.currentUser.id, planId);
                        showToast(`Investment of ${formatCurrency(plan.amount)} activated!`, 'success');
                        renderView('dashboard');
                    } catch (err) {
                        showToast(err.message, 'error');
                    }
                    btn.disabled = false;
                    const plan = PLANS.find(p => p.id === planId);
                    btn.innerHTML = plan ? `<i class="fas fa-rocket"></i> Invest ${formatCurrency(plan.amount)}` :
                        'Invest';
                });
            }
        }

        // ============================================================
        //  ADMIN PANEL
        // ============================================================
        function toggleAdminPanel() {
            const panel = document.getElementById('adminPanel');
            const overlay = document.getElementById('adminOverlay');
            const isOpen = panel.classList.contains('open');
            if (isOpen) {
                closeAdminPanel();
            } else {
                state.adminAuthenticated = false;
                document.getElementById('adminPasswordInput').value = '';
                openAdminPanel();
            }
        }

        function openAdminPanel() {
            const panel = document.getElementById('adminPanel');
            const overlay = document.getElementById('adminOverlay');
            panel.classList.add('open');
            overlay.classList.add('open');

            if (state.adminAuthenticated) {
                renderAdminContent();
            } else {
                const container = document.getElementById('adminContent');
                container.innerHTML = `
                  <div class="empty-state">
                    <i class="fas fa-lock"></i>
                    <p>Enter admin password to continue</p>
                    <div style="margin-top:12px;max-width:260px;margin-left:auto;margin-right:auto;">
                      <div class="form-group" style="margin-bottom:10px;">
                        <input type="password" id="adminPasswordInput" placeholder="Enter password" style="text-align:center;" />
                      </div>
                      <button class="btn btn-gold btn-block btn-sm" id="adminAuthBtn">Unlock Panel</button>
                    </div>
                  </div>
                `;
                document.getElementById('adminAuthBtn')?.addEventListener('click', () => {
                    const pw = document.getElementById('adminPasswordInput').value;
                    if (pw === CONFIG.ADMIN_PASSWORD) {
                        state.adminAuthenticated = true;
                        renderAdminContent();
                        showToast('Admin access granted', 'success');
                    } else {
                        showToast('Incorrect password', 'error');
                    }
                });
                document.getElementById('adminPasswordInput')?.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') document.getElementById('adminAuthBtn').click();
                });
            }
        }

        function closeAdminPanel() {
            const panel = document.getElementById('adminPanel');
            const overlay = document.getElementById('adminOverlay');
            panel.classList.remove('open');
            overlay.classList.remove('open');
        }

        function renderAdminContent() {
            if (!state.adminAuthenticated) return;
            const container = document.getElementById('adminContent');
            const pendingDeposits = state.deposits.filter(d => d.status === 'pending');

            if (pendingDeposits.length === 0) {
                container.innerHTML = `
                  <div class="empty-state">
                    <i class="fas fa-check-circle" style="color:#27ae60;"></i>
                    <p>No pending deposits to validate</p>
                    <span style="font-size:12px;">All deposits are up to date</span>
                  </div>
                `;
                document.getElementById('adminBadge').style.display = 'none';
                return;
            }

            document.getElementById('adminBadge').style.display = 'block';

            container.innerHTML = `
              <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">
                <i class="fas fa-info-circle"></i> ${pendingDeposits.length} deposit(s) awaiting verification
              </p>
              ${pendingDeposits.map(d => {
                const user = findUserById(d.userId);
                return `
                  <div class="deposit-item" data-id="${d.id}">
                    <div class="deposit-info">
                      <span class="user">${user ? user.fullName : 'Unknown'}</span>
                      <span class="amount">${formatCurrency(d.amount)}</span>
                      <span class="status pending">Pending</span>
                    </div>
                    <div style="font-size:12px;color:var(--text-muted);margin:4px 0;">
                      ${formatDate(d.createdAt)}
                    </div>
                    <div class="bank-details-mini">
                      <span><i class="fas fa-university"></i> ${d.bankName || 'N/A'}</span>
                      <span><i class="fas fa-hashtag"></i> ${d.accountNumber || 'N/A'}</span>
                      <span><i class="fas fa-user"></i> ${d.accountName || 'N/A'}</span>
                    </div>
                    ${d.receipt ? `<img src="${d.receipt}" class="receipt-preview" alt="Receipt" />` : ''}
                    <div class="deposit-actions">
                      <button class="btn btn-success btn-sm admin-approve" data-id="${d.id}"><i class="fas fa-check"></i> Approve</button>
                      <button class="btn btn-danger btn-sm admin-reject" data-id="${d.id}"><i class="fas fa-times"></i> Reject</button>
                    </div>
                  </div>
                `;
              }).join('')}
            `;

            container.querySelectorAll('.admin-approve').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.dataset.id;
                    if (confirm('Approve this deposit?')) {
                        try {
                            await approveDeposit(id);
                            showToast('Deposit approved! Funds added to wallet.', 'success');
                            await loadAllData();
                            renderAdminContent();
                            if (state.currentUser) renderView('dashboard');
                        } catch (err) {
                            showToast(err.message, 'error');
                        }
                    }
                });
            });

            container.querySelectorAll('.admin-reject').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.dataset.id;
                    if (confirm('Reject this deposit?')) {
                        try {
                            await rejectDeposit(id);
                            showToast('Deposit rejected.', 'warning');
                            await loadAllData();
                            renderAdminContent();
                            if (state.currentUser) renderView('dashboard');
                        } catch (err) {
                            showToast(err.message, 'error');
                        }
                    }
                });
            });
        }

        // ============================================================
        //  LOGOUT
        // ============================================================
        function handleLogout() {
            clearSession();
            state.currentUser = null;
            state.adminAuthenticated = false;
            showToast('Logged out successfully', 'info');
            renderView('home');
            closeAdminPanel();
        }

        // ============================================================
        //  INIT
        // ============================================================
        async function init() {
            const theme = getPreferredTheme();
            setTheme(theme);

            try {
                await loadAllData();
                calculateReturns();

                const session = getSession();
                if (session) {
                    const user = findUserById(session.id);
                    if (user) {
                        state.currentUser = user;
                        renderView('dashboard');
                    } else {
                        clearSession();
                        renderView('home');
                    }
                } else {
                    const urlParams = new URLSearchParams(window.location.search);
                    const ref = urlParams.get('ref');
                    if (ref) {
                        renderView('register');
                        setTimeout(() => {
                            const input = document.getElementById('regReferral');
                            if (input) input.value = ref.toUpperCase();
                        }, 100);
                    } else {
                        renderView('home');
                    }
                }

                const pendingCount = state.deposits.filter(d => d.status === 'pending').length;
                document.getElementById('adminBadge').style.display = pendingCount > 0 ? 'block' : 'none';

                setInterval(async () => {
                    await loadAllData();
                    calculateReturns();
                    if (state.currentView === 'dashboard') renderView('dashboard');
                    if (document.getElementById('adminPanel').classList.contains('open') && state.adminAuthenticated)
                        renderAdminContent();
                    const pending = state.deposits.filter(d => d.status === 'pending').length;
                    document.getElementById('adminBadge').style.display = pending > 0 ? 'block' : 'none';
                }, 30000);

            } catch (err) {
                console.error('Init error:', err);
                showToast('Error loading data. Please refresh.', 'error');
                renderView('home');
            }
        }

        init();
    </script>
</body>
</html>
